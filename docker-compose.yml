services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - VITE_DEV_SERVER_URL=http://localhost:5173
    volumes:
      - .:/var/www/html
      - fintrax-vendor:/var/www/html/vendor
      - fintrax-node-modules:/var/www/html/node_modules
      - fintrax-playwright-cache:/root/.cache/ms-playwright
    restart: unless-stopped

  queue:
    build:
      context: .
      target: dev
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - .:/var/www/html
      - fintrax-vendor:/var/www/html/vendor
      - fintrax-node-modules:/var/www/html/node_modules
    depends_on:
      - app
    restart: unless-stopped

  vite:
    build:
      context: .
      target: dev
    command: ["npm", "run", "dev", "--", "--host=0.0.0.0"]
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - .:/var/www/html
      - fintrax-vendor:/var/www/html/vendor
      - fintrax-node-modules:/var/www/html/node_modules
    depends_on:
      - app
    restart: unless-stopped

volumes:
  fintrax-vendor:
  fintrax-node-modules:
  fintrax-playwright-cache:
