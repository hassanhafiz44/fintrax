name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      app_digest: ${{ steps.build_app.outputs.digest }}
      web_digest: ${{ steps.build_web.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3

      - name: Extract metadata (app image)
        id: meta_app
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-app
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push app image
        id: build_app
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: app
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (web image)
        id: meta_web
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push web image
        id: build_web
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: web
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Copy compose file and nginx config to server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: 11222
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,deploy/fintrax.hassanpi.com.conf"
          target: "/opt/fintrax"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-app@${{ needs.build.outputs.app_digest }}
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web@${{ needs.build.outputs.web_digest }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: 11222
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: APP_IMAGE,WEB_IMAGE
          script: |
            set -e
            cd /opt/fintrax
            mv docker-compose.prod.yml docker-compose.yml
            sed -i "s#image: ghcr.io/.*-app:latest#image: ${APP_IMAGE}#" docker-compose.yml
            sed -i "s#image: ghcr.io/.*-web:latest#image: ${WEB_IMAGE}#" docker-compose.yml
            docker compose pull
            docker compose run --rm app php artisan migrate --force
            docker compose up -d --remove-orphans
            docker image prune -f
            sudo cp deploy/fintrax.hassanpi.com.conf /etc/nginx/sites-available/fintrax.hassanpi.com.conf
            sudo ln -sf /etc/nginx/sites-available/fintrax.hassanpi.com.conf /etc/nginx/sites-enabled/fintrax.hassanpi.com.conf
            sudo nginx -t
            sudo systemctl reload nginx
            rm -rf deploy
