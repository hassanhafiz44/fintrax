; Fintrax PHP-FPM pool — install to /etc/php/8.5/fpm/pool.d/fintrax.conf
; Ported from the old docker/www.conf. nginx talks to this via the unix socket.
[fintrax]
user = www-data
group = www-data

listen = /run/php/fintrax.sock
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4

; The app reads config from its .env file, not the FPM process environment,
; so workers don't need (and shouldn't inherit) the host's environment.
clear_env = yes
