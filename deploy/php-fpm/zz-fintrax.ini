; Fintrax PHP settings — install to /etc/php/8.5/fpm/conf.d/zz-fintrax.ini
; Ported from the old docker/php.ini. validate_timestamps=0 means every deploy
; MUST reload php-fpm (the deploy workflow does this) for new code to take effect.
opcache.enable=1
opcache.validate_timestamps=0
opcache.memory_consumption=128
opcache.max_accelerated_files=20000
opcache.interned_strings_buffer=16

memory_limit=256M
upload_max_filesize=20M
post_max_size=20M
