# Host-machine nginx config — reverse proxy to the fintrax docker-compose stack.
# Place in /etc/nginx/sites-available/, symlink to sites-enabled/, then `nginx -t && systemctl reload nginx`.
# TLS managed by Certbot (certbot --nginx -d fintrax.hassanpi.com) — do not strip the "managed by Certbot" blocks below.

server {
    server_name fintrax.hassanpi.com;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/fintrax.hassanpi.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/fintrax.hassanpi.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = fintrax.hassanpi.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name fintrax.hassanpi.com;
    return 404; # managed by Certbot


}
