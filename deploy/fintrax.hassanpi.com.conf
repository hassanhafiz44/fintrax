# Host-machine nginx config — reverse proxy to the fintrax docker-compose stack.
# Place in /etc/nginx/sites-available/, symlink to sites-enabled/, then `nginx -t && systemctl reload nginx`.
# Add TLS (e.g. `certbot --nginx -d fintrax.hassanpi.com`) once DNS resolves.

server {
    listen 80;
    listen [::]:80;
    server_name fintrax.hassanpi.com;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
