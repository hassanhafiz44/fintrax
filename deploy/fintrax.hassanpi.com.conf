# Host-machine nginx config — serves the fintrax app directly from PHP-FPM.
# Place in /etc/nginx/sites-available/, symlink to sites-enabled/, then
# `nginx -t && systemctl reload nginx`. The deploy workflow does this automatically.
# TLS managed by Certbot (certbot --nginx -d fintrax.hassanpi.com) — do not strip
# the "managed by Certbot" blocks below.
#
# `root` points at the `current` release symlink (/opt/fintrax/current). After a
# release flip the deploy script reloads nginx so the cached realpath updates.

server {
    server_name fintrax.hassanpi.com;

    root /opt/fintrax/current/public;
    index index.php;

    client_max_body_size 20M;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Deny dotfiles, but never the ACME challenge path (Certbot HTTP-01 renewals).
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* ^/build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.php {
        fastcgi_pass unix:/run/php/fintrax.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ \.php$ {
        deny all;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/fintrax.hassanpi.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/fintrax.hassanpi.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = fintrax.hassanpi.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name fintrax.hassanpi.com;
    return 404; # managed by Certbot


}
